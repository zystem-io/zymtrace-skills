name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip fork PRs — they can't access the API-key secret anyway.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for correctness, security, and clarity. This repo is a
            Claude Code skills/plugin for zymtrace. Pay special attention to:
            - SKILL.md frontmatter: `name` matches the directory, and `metadata.version`
              matches plugin.json (all versions stay in sync).
            - Intra-plugin paths use ${CLAUDE_PLUGIN_ROOT}, never bare ./scripts or
              relative reference paths (skills run with the user's cwd, not the skill dir).
            - Security-constraints sections aren't weakened; secrets are never written
              to values files, scripts, or chat (always *SecretName references).
            - Helm guidance keeps --reset-then-reuse-values and namespace/release resolution
              per zymtrace/shared/conventions.md.
            Leave inline comments on specific lines, plus a short summary comment.
          claude_args: |
            --max-turns 10
            --model claude-sonet-4-6
          track_progress: true
