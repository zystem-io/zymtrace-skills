# CPU-only profiler agent — Helm values for the zymtrace profiler chart.
#
# Use case: profile CPU code (eBPF unwinder for native + Python/Go/Java/Node).
# No GPU profiling, no GPU metrics.
#
# Install:
#   helm upgrade --install profiler zymtrace/profiler \
#     --namespace zymtrace --create-namespace \
#     -f zymtrace-profiler-values.yaml \
#     --reset-then-reuse-values --atomic --debug
#
# The DaemonSet runs on every node by default. To restrict scheduling, set nodeSelector below.

global:
  # Optional: tag profiles with a stable cluster identifier so multi-cluster setups
  # can be filtered in the UI. Leave empty if you only have one cluster.
  ClusterMetadata:
    cluster_id: ""   # e.g. "prod-eks-us-west-2"

profiler:
  args:
    # Where to send profiles. Default assumes backend in the same cluster,
    # `zymtrace` namespace, default service name. Adjust for your setup.
    - "-collection-agent=zymtrace-gateway.zymtrace.svc.cluster.local:80"

    # In-cluster gateway is plain HTTP (TLS terminates at ingress, not at the service).
    # If pointing at an external HTTPS endpoint, REMOVE this line.
    - "-disable-tls"

    # Optional: tags for filtering in the UI. Format: key:value;key:value
    # - "-tags=env:prod;region:us-west-2"

  # nodeSelector: {}
  # tolerations:
  #   - operator: "Exists"   # uncomment to profile every node, including tainted ones
